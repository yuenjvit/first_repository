<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Son 3CE - お問い合わせ</title>

  <!-- Reuse existing project styles (mock front-end only) -->
  <link rel="stylesheet" href="stylesheet_0.css">
  <link rel="stylesheet" href="stylesheet_1.css">
  <link rel="stylesheet" href="stylesheet_2.css">
  <link rel="stylesheet" href="stylesheet_3.css">
  <link rel="stylesheet" href="stylesheet_4.css">
  <link rel="stylesheet" href="stylesheet_5.css">
  <link rel="stylesheet" href="stylesheet_6.css">

  <link rel="stylesheet" href="stylesheet_10.css">
  <link rel="stylesheet" href="stylesheet_11.css">
  <link rel="stylesheet" href="stylesheet_12.css">
  <link rel="stylesheet" href="stylesheet_13.css">
  <link rel="stylesheet" href="stylesheet_14.css">

  <style>
    body { font-family: "Montserrat", Arial, sans-serif; color: #115489; margin: 0; padding: 0; }
    .contact-wrap { max-width: 900px; margin: 0 auto; padding: 56px 20px; }
    .contact-title { margin: 0 0 16px; font-size: 28px; }
    .contact-lead { margin: 0 0 28px; opacity: 0.9; }
    .contact-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { grid-column: span 1; }
    .field.full { grid-column: 1 / -1; }
    label { display: block; font-size: 14px; margin-bottom: 8px; }
    input[type="text"], input[type="email"], select, textarea {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid rgba(17, 84, 137, 0.25);
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      background: #fff;
    }
    textarea { min-height: 160px; resize: vertical; }
    .actions { grid-column: 1 / -1; margin-top: 8px; }
    .btn-primary {
      display: inline-block;
      background: #26c4fc;
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    .btn-primary:active { transform: translateY(1px); }
  </style>
</head>

<body>
  <div id="page" class="site">
    <header id="site-header" class="site-header">
      <div class="header-main has-center">
        <div class="header-container farmart-container">
          <div class="header-items header-items--center">
            <nav class="main-navigation primary-navigation" aria-label="Primary">
              <ul style="list-style:none; margin:0; padding:0; display:flex; gap:18px; flex-wrap:wrap;">
                <li><a href="index.html" style="text-decoration:none; color:#115489; font-weight:600;">TOP</a></li>
                <li><a href="contact.html" style="text-decoration:none; color:#115489; font-weight:600;">お問い合わせ</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main class="contact-wrap">
      <h1 class="contact-title">お問い合わせ</h1>
      <p class="contact-lead">以下のフォームにご入力ください（送信はモックです）。</p>

      <form class="contact-form" action="#" method="post" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="name">お名前</label>
          <input id="name" name="name" type="text" placeholder="例：山田 太郎" autocomplete="name">
        </div>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" placeholder="例：yamada@example.com" autocomplete="email">
        </div>

        <div class="field full">
          <label for="topic">ご用件</label>
          <select id="topic" name="topic">
            <option value="general" selected>一般のお問い合わせ</option>
            <option value="order">ご注文について</option>
            <option value="support">サポートについて</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="field full">
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="message" placeholder="ご用件を入力してください"></textarea>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">送信</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
